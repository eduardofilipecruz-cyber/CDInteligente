<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Criar Conta — Caderno Digital Inteligente</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="css/style.css">
<link rel="stylesheet" href="css/login.css">
</head>
<body class="auth-body">
  <div class="auth-wrap fade-up">
    <div class="auth-card glass">
      <div class="auth-logo">
        <div class="mark">CDI</div>
        <h1>Criar nova conta</h1>
        <p>Cadastre-se para começar a organizar seus estudos</p>
      </div>

      <div class="auth-error" id="erroCadastro"></div>
      <div class="auth-success" id="sucessoCadastro"></div>

      <form id="formCadastro">
        <div class="field">
          <label for="nome">Nome completo</label>
          <input type="text" id="nome" placeholder="Seu nome completo" required>
        </div>
        <div class="field">
          <label for="usuario">Usuário</label>
          <input type="text" id="usuario" placeholder="Escolha um usuário" required>
        </div>
        <div class="field pass-field">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="Mínimo 6 caracteres" required>
          <span class="pass-toggle" id="togglePass1">👁️ Mostrar</span>
          <div class="strength-bar"><span id="barraForca"></span></div>
        </div>
        <div class="field pass-field">
          <label for="confirmarSenha">Confirmar senha</label>
          <input type="password" id="confirmarSenha" placeholder="Repita a senha" required>
          <span class="pass-toggle" id="togglePass2">👁️ Mostrar</span>
        </div>

        <div class="auth-actions">
          <button type="submit" class="btn btn-primary" id="btnCadastrar">Criar conta</button>
          <button type="button" class="btn btn-ghost" onclick="location.href='login.html'">Voltar para login</button>
        </div>
      </form>

      <div class="auth-switch">Já tem conta? <a href="login.html">Entrar</a></div>
    </div>
  </div>

  <script src="js/database.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/cadastro.js"></script>
</body>
</html>
